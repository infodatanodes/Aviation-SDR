<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Spacenodes Aviation SDR</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', Consolas, monospace;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

@keyframes flash {
    0% { background: rgba(255, 230, 0, 0.25); }
    100% { background: transparent; }
}

@keyframes conn-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

/* -- TITLE BAR -- */
#title-bar {
    height: 40px;
    background: linear-gradient(135deg, #00bfff 0%, #0099cc 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    box-shadow: 0 2px 12px rgba(0, 191, 255, 0.3);
    flex-shrink: 0;
}

#title-bar h1 {
    font-size: 15px;
    font-weight: 700;
    color: #0a0a0a;
    letter-spacing: 2px;
}

#title-bar .right {
    display: flex;
    align-items: center;
    gap: 24px;
    color: #0a0a0a;
    font-weight: 600;
    font-size: 14px;
}

#title-bar .right .clock {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
}

#conn-error {
    display: none;
    color: #ff3333;
    font-weight: 700;
    font-size: 13px;
    animation: conn-pulse 1s infinite;
}

/* -- EMERGENCY BANNER -- */
#emergency-banner {
    display: none;
    background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
    padding: 8px 24px;
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    letter-spacing: 2px;
    animation: emergency-flash 0.5s infinite alternate;
    flex-shrink: 0;
}

@keyframes emergency-flash {
    0% { background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%); }
    100% { background: linear-gradient(135deg, #ff4444 0%, #ff0000 100%); }
}

/* -- MAIN GRID (3x2) -- */
#main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    padding: 8px 12px;
    flex: 1;
    min-height: 0;
}

/* -- PANEL SHARED -- */
.panel {
    background: #111122;
    border: 1px solid #2a2a4e;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

.panel-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: #0d0d1a;
    border-left: 4px solid #2a2a4e;
    min-height: 36px;
    flex-shrink: 0;
}

.panel-hdr .title {
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 1px;
}

.panel-hdr .freq-label {
    font-size: 12px;
    color: #888;
    margin-top: 1px;
}

.panel-hdr .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(50, 50, 50, 0.6);
    color: #666;
    text-transform: uppercase;
}

.panel-hdr .badge.active {
    background: rgba(0, 255, 100, 0.15);
    color: #00ff88;
    animation: pulse 1.5s infinite;
    box-shadow: 0 0 12px rgba(0, 255, 100, 0.3);
}

.panel-hdr .badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #444;
}

.panel-hdr .badge.active .dot {
    background: #00ff88;
    box-shadow: 0 0 6px #00ff88;
}

.panel-body {
    flex: 1;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    min-height: 0;
}

/* -- FREQ PANEL SPARKLINE -- */
.freq-sparkline {
    display: flex;
    align-items: flex-end;
    gap: 1px;
    height: 28px;
    padding: 2px 0;
    flex-shrink: 0;
}

.spark-bar {
    flex: 1;
    min-width: 0;
    border-radius: 1px 1px 0 0;
    min-height: 1px;
}

/* -- FREQ PANEL STATS ROW -- */
.freq-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #888;
    padding: 2px 0;
    flex-shrink: 0;
    border-bottom: 1px solid #1a1a2e;
}

.freq-stats .total {
    color: #ccc;
    font-weight: 700;
}

.freq-stats .last-heard {
    color: #aaa;
}

.freq-stats .last-heard.stale {
    color: #555;
}

/* -- FREQ PANEL TX HISTORY -- */
.tx-history {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 0;
}

.tx-history-hdr {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 8px;
    padding: 4px 8px;
    font-size: 9px;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #2a2a4e;
    flex-shrink: 0;
}

.tx-entry {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 8px;
    padding: 3px 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42, 42, 78, 0.3);
}

.tx-entry.new-entry {
    animation: flash 1.5s ease-out;
}

.tx-entry .time { color: #aaa; }
.tx-entry .dur { color: #ccc; text-align: right; }

.tx-empty {
    padding: 12px 8px;
    color: #555;
    font-size: 12px;
    text-align: center;
}

/* -- ADS-B TABLE -- */
.adsb-hdr {
    display: grid;
    grid-template-columns: 100px 70px 65px 65px 55px 55px;
    gap: 6px;
    padding: 6px 10px;
    background: #0d0d1a;
    color: #555;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
    border-bottom: 1px solid #2a2a4e;
    flex-shrink: 0;
}

.adsb-row {
    display: grid;
    grid-template-columns: 100px 70px 65px 65px 55px 55px;
    gap: 6px;
    padding: 4px 10px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42, 42, 78, 0.3);
    align-items: center;
}

.adsb-row:hover { background: rgba(34, 211, 238, 0.05); }

.adsb-callsign { color: #22d3ee; font-weight: 700; }
.adsb-alt { color: #ccc; }
.adsb-spd { color: #aaa; }
.adsb-dist { color: #ccc; }
.adsb-rssi { color: #888; }
.adsb-sqk { color: #888; font-size: 10px; }
.adsb-sqk.emergency { color: #ff3333; font-weight: 700; }

.adsb-empty {
    padding: 12px 8px;
    color: #555;
    font-size: 12px;
    text-align: center;
}

/* -- ACARS MESSAGES -- */
.acars-hdr {
    display: grid;
    grid-template-columns: 70px 80px 70px 1fr;
    gap: 6px;
    padding: 6px 10px;
    background: #0d0d1a;
    color: #555;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
    border-bottom: 1px solid #2a2a4e;
    flex-shrink: 0;
}

.acars-row {
    display: grid;
    grid-template-columns: 70px 80px 70px 1fr;
    gap: 6px;
    padding: 4px 10px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42, 42, 78, 0.3);
}

.acars-time { color: #aaa; }
.acars-flight { color: #f59e0b; font-weight: 700; }
.acars-tail { color: #888; }
.acars-text { color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.acars-empty {
    padding: 12px 8px;
    color: #555;
    font-size: 12px;
    text-align: center;
}
</style>
</head>
<body>

<!-- TITLE BAR -->
<div id="title-bar">
    <h1>SPACENODES AVIATION SDR MONITOR</h1>
    <div class="right">
        <span id="conn-error">NO SIGNAL</span>
        <span id="uptime">--</span>
        <span class="clock" id="clock">--:--:--</span>
    </div>
</div>

<!-- EMERGENCY BANNER -->
<div id="emergency-banner"></div>

<!-- MAIN GRID: 3x2 -->
<div id="main-grid">
    <!-- Row 1: DFW Approach | ADS-B | ACARS -->
    <div class="panel" id="panel-freq-0"></div>

    <div class="panel" id="panel-adsb">
        <div class="panel-hdr" style="border-left-color: #22d3ee;">
            <div>
                <div class="title">ADS-B TRACKER</div>
                <div class="freq-label">SN:00000003 &bull; 1090 MHz</div>
            </div>
            <div class="badge" id="adsb-badge">
                <span class="dot"></span>
                <span id="adsb-count-label">0 AIRCRAFT</span>
            </div>
        </div>
        <div class="adsb-hdr">
            <span>Callsign</span>
            <span>Alt (ft)</span>
            <span>Spd (kt)</span>
            <span>Dist (nm)</span>
            <span>RSSI</span>
            <span>Squawk</span>
        </div>
        <div class="panel-body" id="adsb-list" style="padding: 0; gap: 0;"></div>
    </div>

    <div class="panel" id="panel-acars">
        <div class="panel-hdr" style="border-left-color: #f59e0b;">
            <div>
                <div class="title">ACARS DECODER</div>
                <div class="freq-label">SN:00000004 &bull; 131.550 MHz</div>
            </div>
            <div class="badge" id="acars-badge"><span class="dot"></span>LISTENING</div>
        </div>
        <div class="acars-hdr">
            <span>Time</span>
            <span>Flight</span>
            <span>Reg</span>
            <span>Message</span>
        </div>
        <div class="panel-body" id="acars-list" style="padding: 0; gap: 0;"></div>
    </div>

    <!-- Row 2: Regional Approach | DFW Departure | DFW Clearance -->
    <div class="panel" id="panel-freq-1"></div>
    <div class="panel" id="panel-freq-2"></div>
    <div class="panel" id="panel-freq-3"></div>
</div>

<script>
const CHANNEL_COLORS = {
    'DFW Approach': '#00bfff',
    'Regional Approach': '#a855f7',
    'DFW Departure': '#00ff88',
    'DFW Clearance': '#ff6b35'
};

const DEFAULT_COLOR = '#00bfff';
const EMERGENCY_SQUAWKS = new Set(['7500', '7600', '7700']);

// Track previous state for new-entry detection
let prevTxCounts = {};
let prevSquelch = {};
let initialized = false;

function getColor(name) {
    return CHANNEL_COLORS[name] || DEFAULT_COLOR;
}

function fmtNum(n) {
    return n != null ? n.toLocaleString() : '--';
}

function formatLastActive(secs) {
    if (secs == null) return 'No activity';
    if (secs < 5) return 'Just now';
    if (secs < 60) return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
    return `${Math.floor(secs / 3600)}h ago`;
}

// -- BUILD FREQUENCY PANEL --
function buildFreqPanel(ch, panelId) {
    const panel = document.getElementById(panelId);
    if (!panel) return;

    const color = getColor(ch.name);
    const prevCount = prevSquelch[ch.name];
    const squelchDelta = (prevCount != null && ch.squelch_opens > prevCount);
    const isActive = ch.active === true || squelchDelta;
    const statusText = isActive ? 'LIVE' : 'IDLE';

    // Header
    const dotStyle = isActive
        ? `background:${color}; box-shadow: 0 0 6px ${color};`
        : 'background:#444;';
    const badgeClass = isActive ? 'badge active' : 'badge';

    // Sparkline
    const sparkline = ch.sparkline || [];
    const maxSpark = Math.max(1, ...sparkline);
    let sparkHtml = '';
    for (let i = 0; i < sparkline.length; i++) {
        const val = sparkline[i];
        const h = val > 0 ? Math.max(3, Math.round((val / maxSpark) * 24)) : 1;
        const barColor = val > 0 ? color : '#2a2a4e';
        const opacity = val > 0 ? 0.9 : 0.15;
        sparkHtml += `<div class="spark-bar" style="height:${h}px;background:${barColor};opacity:${opacity};"></div>`;
    }

    // Last heard
    const lastText = formatLastActive(ch.last_active_secs);
    const staleClass = (ch.last_active_secs == null || ch.last_active_secs > 300) ? 'last-heard stale' : 'last-heard';

    // History
    const history = ch.history || [];
    const prevTxCount = prevTxCounts[ch.name] || 0;
    let historyHtml = '';
    if (history.length === 0) {
        historyHtml = '<div class="tx-empty">No transmissions yet</div>';
    } else {
        historyHtml = `<div class="tx-history-hdr"><span>Time</span><span style="text-align:right">Duration</span></div>`;
        history.forEach((tx, i) => {
            const isNew = initialized && i === 0 && history.length > prevTxCount;
            const cls = isNew ? 'tx-entry new-entry' : 'tx-entry';
            historyHtml += `<div class="${cls}">
                <span class="time">${tx.timestamp}</span>
                <span class="dur">${tx.duration}s</span>
            </div>`;
        });
    }

    panel.innerHTML = `
        <div class="panel-hdr" style="border-left-color: ${color};">
            <div>
                <div class="title">${ch.name.toUpperCase()}</div>
                <div class="freq-label">${ch.freq} MHz</div>
            </div>
            <div class="${badgeClass}">
                <span class="dot" style="${dotStyle}"></span>${statusText}
            </div>
        </div>
        <div class="panel-body">
            <div class="freq-sparkline">${sparkHtml}</div>
            <div class="freq-stats">
                <span>Total: <span class="total">${ch.squelch_opens.toLocaleString()}</span></span>
                <span class="${staleClass}">Last: ${lastText}</span>
            </div>
            <div class="tx-history">${historyHtml}</div>
        </div>`;

    prevSquelch[ch.name] = ch.squelch_opens;
    prevTxCounts[ch.name] = history.length;
}

// -- UPDATE CHANNELS --
function updateChannels(channels) {
    if (!channels) return;
    // Map channels to panels: index 0=DFW Approach, 1=Regional, 2=Departure, 3=Clearance
    channels.forEach((ch, i) => {
        buildFreqPanel(ch, `panel-freq-${i}`);
    });
}

// -- ADS-B --
function updateAdsb(adsb) {
    if (!adsb) return;

    const count = adsb.count || 0;
    const badge = document.getElementById('adsb-badge');
    const label = document.getElementById('adsb-count-label');

    label.textContent = `${count} AIRCRAFT`;
    badge.className = 'badge' + (count > 0 ? ' active' : '');
    badge.querySelector('.dot').style.cssText = count > 0
        ? 'background:#22d3ee; box-shadow: 0 0 6px #22d3ee;'
        : 'background:#444;';

    const list = document.getElementById('adsb-list');
    const aircraft = adsb.aircraft || [];

    if (aircraft.length === 0) {
        list.innerHTML = '<div class="adsb-empty">No aircraft detected</div>';
        return;
    }

    let html = '';
    for (const a of aircraft) {
        const isEmergency = EMERGENCY_SQUAWKS.has(a.squawk);
        const sqkClass = isEmergency ? 'adsb-sqk emergency' : 'adsb-sqk';
        const stale = a.seen > 15;
        const rowOpacity = stale ? 'opacity: 0.4;' : '';

        html += `<div class="adsb-row" style="${rowOpacity}">
            <span class="adsb-callsign">${a.flight || a.hex}</span>
            <span class="adsb-alt">${fmtNum(a.alt)}</span>
            <span class="adsb-spd">${a.speed != null ? Math.round(a.speed) : '--'}</span>
            <span class="adsb-dist">${a.distance != null ? a.distance.toFixed(1) : '--'}</span>
            <span class="adsb-rssi">${a.rssi != null ? a.rssi.toFixed(1) : '--'}</span>
            <span class="${sqkClass}">${a.squawk || '--'}</span>
        </div>`;
    }
    list.innerHTML = html;
}

// -- ACARS --
function updateAcars(acars) {
    const list = document.getElementById('acars-list');
    const badge = document.getElementById('acars-badge');

    if (!acars || acars.length === 0) {
        list.innerHTML = '<div class="acars-empty">No messages decoded yet &mdash; listening on 4 frequencies</div>';
        badge.className = 'badge';
        badge.innerHTML = '<span class="dot"></span>LISTENING';
        return;
    }

    badge.className = 'badge active';
    badge.innerHTML = `<span class="dot" style="background:#f59e0b; box-shadow: 0 0 6px #f59e0b;"></span>${acars.length} MSG`;

    let html = '';
    for (const m of acars) {
        html += `<div class="acars-row">
            <span class="acars-time">${m.timestamp}</span>
            <span class="acars-flight">${m.flight || '--'}</span>
            <span class="acars-tail">${m.tail || '--'}</span>
            <span class="acars-text">${m.text || m.label || '--'}</span>
        </div>`;
    }
    list.innerHTML = html;
}

// -- EMERGENCIES --
function updateEmergencies(emergencies) {
    const banner = document.getElementById('emergency-banner');
    if (!emergencies || emergencies.length === 0) {
        banner.style.display = 'none';
        return;
    }
    banner.style.display = 'block';
    const alerts = emergencies.map(e => {
        const dist = e.distance ? ` ${e.distance}nm` : '';
        return `SQUAWK ${e.squawk} ${e.type} — ${e.flight} ${e.alt}ft${dist}`;
    });
    banner.textContent = alerts.join(' | ');

    const rows = document.querySelectorAll('.adsb-row');
    const eFlights = new Set(emergencies.map(e => e.flight));
    rows.forEach(row => {
        const callsign = row.querySelector('.adsb-callsign');
        if (callsign && eFlights.has(callsign.textContent.trim())) {
            row.style.background = 'rgba(255, 0, 0, 0.2)';
            row.style.borderLeft = '3px solid #ff0000';
        }
    });
}

// -- MAIN FETCH --
async function fetchStats() {
    try {
        const res = await fetch('/api/stats');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('conn-error').style.display = 'none';

        // Clock + uptime
        document.getElementById('clock').textContent = data.clock || '--:--:--';
        document.getElementById('uptime').textContent = data.uptime ? `UP ${data.uptime}` : '--';

        updateChannels(data.channels);
        updateAdsb(data.adsb);
        updateAcars(data.acars);
        updateEmergencies(data.emergencies);

        initialized = true;
    } catch (e) {
        document.getElementById('conn-error').style.display = 'inline';
        const now = new Date();
        document.getElementById('clock').textContent =
            String(now.getHours()).padStart(2, '0') + ':' +
            String(now.getMinutes()).padStart(2, '0') + ':' +
            String(now.getSeconds()).padStart(2, '0');
    }
}

setInterval(fetchStats, 2000);
fetchStats();
</script>

</body>
</html>
