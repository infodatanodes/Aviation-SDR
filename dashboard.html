<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Spacenodes Aviation SDR</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', Consolas, monospace;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

@keyframes flash {
    0% { background: rgba(255, 230, 0, 0.25); }
    100% { background: transparent; }
}

@keyframes conn-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

/* -- TITLE BAR -- */
#title-bar {
    height: 40px;
    background: linear-gradient(135deg, #00bfff 0%, #0099cc 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    box-shadow: 0 2px 12px rgba(0, 191, 255, 0.3);
    flex-shrink: 0;
}

#title-bar h1 {
    font-size: 15px;
    font-weight: 700;
    color: #0a0a0a;
    letter-spacing: 2px;
}

#title-bar .right {
    display: flex;
    align-items: center;
    gap: 24px;
    color: #0a0a0a;
    font-weight: 600;
    font-size: 14px;
}

#title-bar .right .clock {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
}

#conn-error {
    display: none;
    color: #ff3333;
    font-weight: 700;
    font-size: 13px;
    animation: conn-pulse 1s infinite;
}

/* -- EMERGENCY BANNER -- */
#emergency-banner {
    display: none;
    background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
    padding: 8px 24px;
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    letter-spacing: 2px;
    animation: emergency-flash 0.5s infinite alternate;
    flex-shrink: 0;
}

@keyframes emergency-flash {
    0% { background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%); }
    100% { background: linear-gradient(135deg, #ff4444 0%, #ff0000 100%); }
}

/* -- MAIN GRID (2 columns) -- */
#main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 8px 12px;
    flex: 1;
    min-height: 0;
}

/* -- PANEL SHARED -- */
.panel {
    background: #111122;
    border: 1px solid #2a2a4e;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

.panel-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: #0d0d1a;
    border-left: 4px solid #2a2a4e;
    min-height: 42px;
    flex-shrink: 0;
}

.panel-hdr .title {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 1px;
}

.panel-hdr .freq-label {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
}

.panel-hdr .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(50, 50, 50, 0.6);
    color: #666;
    text-transform: uppercase;
}

.panel-hdr .badge.active {
    background: rgba(0, 255, 100, 0.15);
    color: #00ff88;
    animation: pulse 1.5s infinite;
    box-shadow: 0 0 12px rgba(0, 255, 100, 0.3);
}

.panel-hdr .badge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #444;
}

.panel-hdr .badge.active .dot {
    background: #00ff88;
    box-shadow: 0 0 6px #00ff88;
}

.panel-body {
    flex: 1;
    padding: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
}

/* -- ADS-B TABLE -- */
.adsb-hdr {
    display: grid;
    grid-template-columns: 120px 80px 75px 75px 65px 65px;
    gap: 6px;
    padding: 8px 14px;
    background: #0d0d1a;
    color: #555;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 11px;
    border-bottom: 1px solid #2a2a4e;
    flex-shrink: 0;
}

.adsb-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
}

.adsb-row {
    display: grid;
    grid-template-columns: 120px 80px 75px 75px 65px 65px;
    gap: 6px;
    padding: 5px 14px;
    font-size: 14px;
    border-bottom: 1px solid rgba(42, 42, 78, 0.3);
    align-items: center;
}

.adsb-row:hover { background: rgba(34, 211, 238, 0.05); }

.adsb-callsign { color: #22d3ee; font-weight: 700; }
.adsb-alt { color: #ccc; }
.adsb-spd { color: #aaa; }
.adsb-dist { color: #ccc; }
.adsb-rssi { color: #888; }
.adsb-sqk { color: #888; font-size: 11px; }
.adsb-sqk.emergency { color: #ff3333; font-weight: 700; }

.adsb-empty, .acars-empty {
    padding: 20px 14px;
    color: #555;
    font-size: 13px;
    text-align: center;
}

/* -- ACARS MESSAGES -- */
.acars-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding: 4px 0;
}

.acars-msg {
    padding: 6px 14px;
    border-bottom: 1px solid rgba(42, 42, 78, 0.3);
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.acars-msg.new-entry {
    animation: flash 1.5s ease-out;
}

.acars-msg-top {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
}

.acars-time { color: #777; font-size: 12px; }
.acars-flight { color: #f59e0b; font-weight: 700; }
.acars-tail { color: #888; font-size: 12px; }

.acars-cat {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
}

.cat-position { background: rgba(34, 211, 238, 0.2); color: #22d3ee; }
.cat-oooi { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
.cat-weather { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
.cat-engine { background: rgba(239, 68, 68, 0.2); color: #f87171; }
.cat-flight_plan { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
.cat-maintenance { background: rgba(239, 68, 68, 0.25); color: #ff6b6b; }
.cat-free_text { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
.cat-ops { background: rgba(100, 100, 100, 0.2); color: #aaa; }
.cat-keepalive { background: rgba(50, 50, 50, 0.2); color: #666; }
.cat-binary { background: rgba(50, 50, 50, 0.2); color: #666; }
.cat-unknown { background: rgba(50, 50, 50, 0.2); color: #888; }

.acars-decoded {
    font-size: 12px;
    color: #bbb;
    padding-left: 2px;
    line-height: 1.4;
}

.acars-decoded .key { color: #666; }
.acars-decoded .val { color: #ccc; }
.acars-decoded .val-highlight { color: #22d3ee; font-weight: 600; }

.acars-raw {
    font-size: 11px;
    color: #555;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    padding-left: 2px;
}
</style>
</head>
<body>

<!-- TITLE BAR -->
<div id="title-bar">
    <h1>SPACENODES AVIATION SDR MONITOR</h1>
    <div class="right">
        <span id="conn-error">NO SIGNAL</span>
        <span id="uptime">--</span>
        <span class="clock" id="clock">--:--:--</span>
    </div>
</div>

<!-- EMERGENCY BANNER -->
<div id="emergency-banner"></div>

<!-- MAIN GRID: 2 columns -->
<div id="main-grid">
    <!-- ADS-B TRACKER -->
    <div class="panel" id="panel-adsb">
        <div class="panel-hdr" style="border-left-color: #22d3ee;">
            <div>
                <div class="title">ADS-B TRACKER</div>
                <div class="freq-label">SN:00000003 &bull; 1090 MHz &bull; D3000 Discone</div>
            </div>
            <div class="badge" id="adsb-badge">
                <span class="dot"></span>
                <span id="adsb-count-label">0 AIRCRAFT</span>
            </div>
        </div>
        <div class="adsb-hdr">
            <span>Callsign</span>
            <span>Alt (ft)</span>
            <span>Spd (kt)</span>
            <span>Dist (nm)</span>
            <span>RSSI</span>
            <span>Squawk</span>
        </div>
        <div class="panel-body">
            <div class="adsb-scroll" id="adsb-list"></div>
        </div>
    </div>

    <!-- ACARS DECODER -->
    <div class="panel" id="panel-acars">
        <div class="panel-hdr" style="border-left-color: #f59e0b;">
            <div>
                <div class="title">ACARS DECODER</div>
                <div class="freq-label">SN:00000104 &bull; 5 NA Freqs &bull; Wideband LNA</div>
            </div>
            <div class="badge" id="acars-badge"><span class="dot"></span>LISTENING</div>
        </div>
        <div class="panel-body">
            <div class="acars-scroll" id="acars-list"></div>
        </div>
    </div>
</div>

<script>
const EMERGENCY_SQUAWKS = new Set(['7500', '7600', '7700']);
let initialized = false;
let prevAcarsCount = 0;

function fmtNum(n) {
    return n != null ? n.toLocaleString() : '--';
}

// -- ADS-B --
function updateAdsb(adsb) {
    if (!adsb) return;

    const count = adsb.count || 0;
    const badge = document.getElementById('adsb-badge');
    const label = document.getElementById('adsb-count-label');

    label.textContent = `${count} AIRCRAFT`;
    badge.className = 'badge' + (count > 0 ? ' active' : '');
    badge.querySelector('.dot').style.cssText = count > 0
        ? 'background:#22d3ee; box-shadow: 0 0 6px #22d3ee;'
        : 'background:#444;';

    const list = document.getElementById('adsb-list');
    const aircraft = adsb.aircraft || [];

    if (aircraft.length === 0) {
        list.innerHTML = '<div class="adsb-empty">No aircraft detected</div>';
        return;
    }

    let html = '';
    for (const a of aircraft) {
        const isEmergency = EMERGENCY_SQUAWKS.has(a.squawk);
        const sqkClass = isEmergency ? 'adsb-sqk emergency' : 'adsb-sqk';
        const stale = a.seen > 15;
        const rowOpacity = stale ? 'opacity: 0.4;' : '';

        html += `<div class="adsb-row" style="${rowOpacity}">
            <span class="adsb-callsign">${a.flight || a.hex}</span>
            <span class="adsb-alt">${fmtNum(a.alt)}</span>
            <span class="adsb-spd">${a.speed != null ? Math.round(a.speed) : '--'}</span>
            <span class="adsb-dist">${a.distance != null ? a.distance.toFixed(1) : '--'}</span>
            <span class="adsb-rssi">${a.rssi != null ? a.rssi.toFixed(1) : '--'}</span>
            <span class="${sqkClass}">${a.squawk || '--'}</span>
        </div>`;
    }
    list.innerHTML = html;
}

// -- ACARS decoded summary --
function formatDecoded(category, parsed) {
    if (!parsed || Object.keys(parsed).length === 0) return '';

    const parts = [];

    switch (category) {
        case 'position': {
            if (parsed.lat != null && parsed.lon != null) {
                parts.push(`<span class="val-highlight">${parsed.lat.toFixed(3)}N, ${Math.abs(parsed.lon).toFixed(3)}W</span>`);
            }
            if (parsed.alt) parts.push(`<span class="key">ALT</span> <span class="val">${fmtNum(parsed.alt)} ft</span>`);
            if (parsed.heading) parts.push(`<span class="key">HDG</span> <span class="val">${parsed.heading}</span>`);
            if (parsed.groundspeed) parts.push(`<span class="key">GS</span> <span class="val">${parsed.groundspeed} kt</span>`);
            if (parsed.waypoint) parts.push(`<span class="key">WPT</span> <span class="val">${parsed.waypoint}</span>`);
            if (parsed.next_waypoint) parts.push(`<span class="key">NEXT</span> <span class="val">${parsed.next_waypoint}</span>`);
            if (parsed.destination) parts.push(`<span class="key">DEST</span> <span class="val">${parsed.destination}</span>`);
            if (parsed.fuel) parts.push(`<span class="key">FUEL</span> <span class="val">${fmtNum(parsed.fuel)} lb</span>`);
            break;
        }
        case 'oooi': {
            const events = {out: 'GATE OUT', off: 'WHEELS OFF', on: 'WHEELS ON', in: 'GATE IN', toic: 'TOIC'};
            if (parsed.event) parts.push(`<span class="val-highlight">${events[parsed.event] || parsed.event}</span>`);
            if (parsed.depa) parts.push(`<span class="key">FROM</span> <span class="val">${parsed.depa}</span>`);
            if (parsed.dsta) parts.push(`<span class="key">TO</span> <span class="val">${parsed.dsta}</span>`);
            if (parsed.gtout) parts.push(`<span class="key">OUT</span> <span class="val">${parsed.gtout}</span>`);
            if (parsed.wloff) parts.push(`<span class="key">OFF</span> <span class="val">${parsed.wloff}</span>`);
            if (parsed.wlon) parts.push(`<span class="key">ON</span> <span class="val">${parsed.wlon}</span>`);
            if (parsed.gtin) parts.push(`<span class="key">IN</span> <span class="val">${parsed.gtin}</span>`);
            if (parsed.eta) parts.push(`<span class="key">ETA</span> <span class="val">${parsed.eta}</span>`);
            break;
        }
        case 'weather': {
            parts.push('<span class="val-highlight">WINDS ALOFT</span>');
            if (parsed.origin) parts.push(`<span class="key">FROM</span> <span class="val">${parsed.origin}</span>`);
            if (parsed.destination) parts.push(`<span class="key">TO</span> <span class="val">${parsed.destination}</span>`);
            if (parsed.observations && parsed.observations.length > 0) {
                const obs = parsed.observations[0];
                parts.push(`<span class="key">WIND</span> <span class="val">${obs.wind_dir}/${obs.wind_speed}kt</span>`);
                parts.push(`<span class="key">TEMP</span> <span class="val">${obs.temp_c}C</span>`);
                parts.push(`<span class="key">FL</span> <span class="val">${Math.round(obs.alt / 100)}</span>`);
            }
            break;
        }
        case 'engine': {
            const etype = parsed.type === 'dfb' ? 'DFB REPORT' : parsed.type === 'performance' ? 'PERF DATA' : 'ENGINE';
            parts.push(`<span class="val-highlight">${etype}</span>`);
            if (parsed.aircraft_type) parts.push(`<span class="key">TYPE</span> <span class="val">${parsed.aircraft_type}</span>`);
            if (parsed.origin) parts.push(`<span class="key">FROM</span> <span class="val">${parsed.origin}</span>`);
            if (parsed.destination) parts.push(`<span class="key">TO</span> <span class="val">${parsed.destination}</span>`);
            break;
        }
        case 'flight_plan': {
            parts.push('<span class="val-highlight">FLIGHT PLAN</span>');
            if (parsed.origin) parts.push(`<span class="key">FROM</span> <span class="val">${parsed.origin}</span>`);
            if (parsed.destination) parts.push(`<span class="key">TO</span> <span class="val">${parsed.destination}</span>`);
            if (parsed.flight_number) parts.push(`<span class="key">FN</span> <span class="val">${parsed.flight_number}</span>`);
            if (parsed.waypoints && Array.isArray(parsed.waypoints)) {
                parts.push(`<span class="key">RTE</span> <span class="val">${parsed.waypoints.slice(0, 6).join('.')}</span>`);
            }
            break;
        }
        case 'maintenance': {
            parts.push('<span class="val-highlight">MAINT ALERT</span>');
            if (parsed.ata_code) parts.push(`<span class="key">ATA</span> <span class="val">${parsed.ata_code}</span>`);
            if (parsed.system) parts.push(`<span class="val">${parsed.system}</span>`);
            if (parsed.component) parts.push(`<span class="val">${parsed.component}</span>`);
            break;
        }
        case 'free_text': {
            if (parsed.origin) parts.push(`<span class="key">FROM</span> <span class="val">${parsed.origin}</span>`);
            if (parsed.destination) parts.push(`<span class="key">TO</span> <span class="val">${parsed.destination}</span>`);
            if (parsed.message) parts.push(`<span class="val">${escapeHtml(parsed.message.substring(0, 120))}</span>`);
            break;
        }
        case 'ops': {
            if (parsed.station) parts.push(`<span class="key">STN</span> <span class="val">${parsed.station}</span>`);
            if (parsed.eta) parts.push(`<span class="key">ETA</span> <span class="val">${parsed.eta}</span>`);
            break;
        }
    }

    return parts.join(' &nbsp; ');
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// -- ACARS --
function updateAcars(acars) {
    const list = document.getElementById('acars-list');
    const badge = document.getElementById('acars-badge');

    if (!acars || acars.length === 0) {
        list.innerHTML = '<div class="acars-empty">No messages decoded yet &mdash; listening on 5 NA frequencies</div>';
        badge.className = 'badge';
        badge.innerHTML = '<span class="dot"></span>LISTENING';
        prevAcarsCount = 0;
        return;
    }

    badge.className = 'badge active';
    badge.innerHTML = `<span class="dot" style="background:#f59e0b; box-shadow: 0 0 6px #f59e0b;"></span>${acars.length} MSG`;

    let html = '';
    for (let i = 0; i < acars.length; i++) {
        const m = acars[i];
        const isNew = initialized && i === 0 && acars.length > prevAcarsCount;
        const cls = isNew ? 'acars-msg new-entry' : 'acars-msg';
        const cat = m.category || 'unknown';
        const catClass = 'cat-' + cat;
        const catLabel = cat.replace('_', ' ');

        const decoded = formatDecoded(cat, m.parsed);
        const rawText = m.text ? escapeHtml(m.text.substring(0, 150)) : '';

        // Format timestamp
        let timeStr = m.timestamp || '';
        if (timeStr.includes('T')) {
            // ISO format — extract time portion
            const parts = timeStr.split('T');
            if (parts[1]) timeStr = parts[1].substring(0, 8);
        }

        html += `<div class="${cls}">
            <div class="acars-msg-top">
                <span class="acars-time">${timeStr}</span>
                <span class="acars-flight">${m.flight || '--'}</span>
                <span class="acars-tail">${m.tail || ''}</span>
                <span class="acars-cat ${catClass}">${catLabel}</span>
            </div>`;

        if (decoded) {
            html += `<div class="acars-decoded">${decoded}</div>`;
        }

        if (rawText && cat !== 'keepalive' && cat !== 'binary') {
            html += `<div class="acars-raw">${rawText}</div>`;
        }

        html += `</div>`;
    }
    list.innerHTML = html;
    prevAcarsCount = acars.length;
}

// -- EMERGENCIES --
function updateEmergencies(emergencies) {
    const banner = document.getElementById('emergency-banner');
    if (!emergencies || emergencies.length === 0) {
        banner.style.display = 'none';
        return;
    }
    banner.style.display = 'block';
    const alerts = emergencies.map(e => {
        const dist = e.distance ? ` ${e.distance}nm` : '';
        return `SQUAWK ${e.squawk} ${e.type} — ${e.flight} ${e.alt}ft${dist}`;
    });
    banner.textContent = alerts.join(' | ');

    const rows = document.querySelectorAll('.adsb-row');
    const eFlights = new Set(emergencies.map(e => e.flight));
    rows.forEach(row => {
        const callsign = row.querySelector('.adsb-callsign');
        if (callsign && eFlights.has(callsign.textContent.trim())) {
            row.style.background = 'rgba(255, 0, 0, 0.2)';
            row.style.borderLeft = '3px solid #ff0000';
        }
    });
}

// -- SELF-HEALING WATCHDOG --
let failCount = 0;
let lastSuccessTime = Date.now();
const MAX_FAILURES = 30;
const MAX_STALE_MS = 5 * 60000;

function checkWatchdog() {
    const staleDuration = Date.now() - lastSuccessTime;
    if (failCount >= MAX_FAILURES || staleDuration >= MAX_STALE_MS) {
        console.warn(`Watchdog triggered: ${failCount} failures, ${Math.round(staleDuration/1000)}s stale — reloading`);
        window.location.reload();
    }
}

// -- MAIN FETCH --
async function fetchStats() {
    try {
        const res = await fetch('/api/stats');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        failCount = 0;
        lastSuccessTime = Date.now();
        document.getElementById('conn-error').style.display = 'none';

        // Clock + uptime
        document.getElementById('clock').textContent = data.clock || '--:--:--';
        document.getElementById('uptime').textContent = data.uptime ? `UP ${data.uptime}` : '--';

        updateAdsb(data.adsb);
        updateAcars(data.acars);
        updateEmergencies(data.emergencies);

        initialized = true;
    } catch (e) {
        failCount++;
        document.getElementById('conn-error').style.display = 'inline';
        const now = new Date();
        document.getElementById('clock').textContent =
            String(now.getHours()).padStart(2, '0') + ':' +
            String(now.getMinutes()).padStart(2, '0') + ':' +
            String(now.getSeconds()).padStart(2, '0');
        checkWatchdog();
    }
}

setInterval(fetchStats, 2000);
fetchStats();
</script>

</body>
</html>
